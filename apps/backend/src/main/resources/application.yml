spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/anybank}
    username: ${DB_USERNAME:anybank}
    password: ${DB_PASSWORD:anybank}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt:
      issuer: anybank
      # 256-bit base64 secret (HS256). Override in prod via APP_SECURITY_JWT_SECRET.
      secret: ${APP_SECURITY_JWT_SECRET:Y2hhbmdlLW1lLXBsZWFzZS1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1tZQ==}
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
