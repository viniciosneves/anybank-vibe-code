<div class="flex flex-col gap-2">
  <label [for]="selectId()" class="text-base font-semibold text-anybank-ink">
    {{ label() }}
  </label>
  <app-select
    [selectId]="selectId()"
    [name]="name() || selectId()"
    [placeholder]="placeholder()"
    [options]="options()"
    [(value)]="value"
  />
</div>
