<label class="relative block w-full max-w-md">
  <span class="sr-only">{{ placeholder() }}</span>
  <input
    type="search"
    [placeholder]="placeholder()"
    [(ngModel)]="value"
    class="w-full rounded-full border border-white bg-white py-2.5 pl-5 pr-12 text-base text-anybank-ink placeholder:text-anybank-ink/60 focus:outline-none focus:ring-2 focus:ring-anybank-blue"
  />
  <button
    type="button"
    aria-label="Buscar"
    class="absolute right-2 top-1/2 -translate-y-1/2 rounded-full p-2 text-anybank-ink hover:bg-anybank-blue-soft"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
  </button>
</label>
