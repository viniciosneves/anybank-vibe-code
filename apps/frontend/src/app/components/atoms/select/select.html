<div class="relative w-full">
  <select
    [id]="selectId()"
    [name]="name() || selectId()"
    [(ngModel)]="value"
    [class]="classes()"
  >
    <option value="" disabled hidden>{{ placeholder() }}</option>
    @for (option of options(); track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
    }
  </select>
  <svg
    class="pointer-events-none absolute right-5 top-1/2 -translate-y-1/2 text-anybank-ink"
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <polyline points="6 9 12 15 18 9" />
  </svg>
</div>
