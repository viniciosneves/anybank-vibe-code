<section
  class="rounded-3xl bg-gradient-to-b from-white to-anybank-blue p-8 md:p-10"
>
  <div class="flex flex-col gap-8 md:flex-row md:justify-between">
    <div class="flex flex-col gap-6">
      <p class="text-base text-anybank-ink">{{ date() }}</p>
      <h1 class="text-3xl font-bold text-anybank-ink md:text-4xl">
        Olá, {{ userName() }}! :)
      </h1>
    </div>

    <div class="flex flex-col gap-1 md:min-w-56 md:text-left">
      <div class="flex items-center justify-between gap-6 border-b border-anybank-ink pb-1">
        <span class="text-xl font-bold text-anybank-ink">Saldo</span>
        <button
          type="button"
          (click)="toggleVisibility()"
          [attr.aria-label]="visible() ? 'Ocultar saldo' : 'Mostrar saldo'"
          [attr.aria-pressed]="!visible()"
          class="rounded-full p-1 text-anybank-ink transition-colors hover:text-anybank-ink/60"
        >
          @if (visible()) {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          } @else {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          }
        </button>
      </div>
      <p class="mt-3 text-base text-anybank-ink">{{ accountType() }}</p>
      <p class="text-3xl font-bold text-anybank-ink">
        {{ visible() ? balance() : 'R$ ••••••' }}
      </p>
    </div>
  </div>
</section>
