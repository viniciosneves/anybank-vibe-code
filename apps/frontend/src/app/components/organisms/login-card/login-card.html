<app-auth-card
  imageSrc="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=700&q=80"
  imageAlt="Pessoa sorrindo enquanto usa o notebook"
>
  <form class="flex flex-col gap-5" (submit)="onSubmit($event)">
    <div>
      <h1 class="text-3xl font-bold text-anybank-ink">Login</h1>
      <p class="mt-2 text-base text-anybank-ink">Preencha os dados do login.</p>
    </div>

    <app-form-field
      label="Email"
      inputId="login-email"
      type="email"
      placeholder="Digite seu e-mail"
      [(value)]="email"
    />

    <div class="flex flex-col gap-1">
      <app-form-field
        label="Senha"
        inputId="login-senha"
        type="password"
        placeholder="******"
        [(value)]="senha"
      />
      <a
        href="#"
        class="self-start text-sm text-anybank-ink underline underline-offset-2 hover:text-anybank-blue"
      >
        Esqueci minha senha
      </a>
    </div>

    <label class="flex items-start gap-3 text-sm text-anybank-ink">
      <app-checkbox inputId="login-policy" [(checked)]="aceitouPolitica" />
      <span>Li e estou ciente quanto a Política de Privacidade.</span>
    </label>

    @if (errorMessage(); as message) {
      <p
        role="alert"
        class="rounded-lg bg-red-50 px-4 py-2 text-sm text-red-700 border border-red-200"
      >
        {{ message }}
      </p>
    }

    <div class="mt-2 flex justify-center">
      <app-button
        type="submit"
        variant="primary"
        [disabled]="!aceitouPolitica() || loading()"
      >
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </app-button>
    </div>
  </form>
</app-auth-card>
