<aside class="rounded-3xl bg-anybank-ink/5 px-6 py-6">
  <h2 class="text-2xl font-bold text-anybank-ink">Extrato</h2>
  <p class="mt-6 text-sm font-bold text-anybank-ink">{{ month() }}</p>

  <div class="mt-2 flex flex-col">
    @for (item of items(); track $index) {
      <app-statement-entry
        [amount]="item.amount"
        [date]="item.date"
        [negative]="item.negative ?? false"
      />
    } @empty {
      <p class="py-2 text-sm text-anybank-ink/60">Sem lançamentos</p>
    }
  </div>
</aside>
