<div class="flex min-h-screen flex-col bg-white">
  <app-dashboard-header [userName]="userName" (logout)="onLogout()" />

  <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-8 md:px-6">
    <div class="grid grid-cols-1 gap-6 lg:grid-cols-[200px_minmax(0,1fr)_280px]">
      <app-sidebar-nav [items]="navLinks" />

      <div class="flex flex-col gap-6">
        <app-balance-card
          [date]="today"
          [userName]="greetingName"
          [balance]="balance"
        />
        <app-transaction-form (submitted)="onTransaction($event)" />
      </div>

      <app-statement-card month="Novembro" [items]="statement" />
    </div>
  </main>
</div>
