services:
  postgres:
    image: postgres:16-alpine
    container_name: anybank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: anybank
      POSTGRES_USER: anybank
      POSTGRES_PASSWORD: anybank
    ports:
      - "5432:5432"
    volumes:
      - anybank-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anybank -d anybank"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  anybank-pgdata:
